[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sqlguard"
version = "0.1.0"
description = "Deterministic, dialect-aware safety guard for LLM-generated SQL — make destructive or exfiltrating queries impossible by construction."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "krish2105" }]
keywords = [
  "sql", "text-to-sql", "text2sql", "llm", "security", "guardrails",
  "sqlglot", "safety", "read-only", "sql-injection", "ai",
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Database",
  "Topic :: Security",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Typing :: Typed",
]
dependencies = ["sqlglot>=25.0"]

[project.optional-dependencies]
test = ["pytest>=8"]

[project.scripts]
sqlguard = "sqlguard.cli:main"

[project.urls]
Homepage = "https://github.com/krish2105/NexusBI/tree/main/packages/sqlguard"
Source = "https://github.com/krish2105/NexusBI"
Issues = "https://github.com/krish2105/NexusBI/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/sqlguard"]

[tool.hatch.build.targets.sdist]
include = ["src/sqlguard", "README.md", "LICENSE", "tests"]
