# Render free-tier deployment for the Nexus BI backend.
# Frontend deploys to Vercel (zero-config: set NEXT_PUBLIC_API_URL to this URL).
#
# Deploy: Render dashboard -> New -> Blueprint -> select this repo. Render reads
# this file and provisions the service. Env vars marked `sync: false` are secrets
# you paste into the Render dashboard after the first deploy — never commit them.
services:
  - type: web
    name: nexus-bi-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LLM_PROVIDER
        value: auto
      # --- Tier 1 upgrades: all optional, all free. Paste real values in the
      # Render dashboard (Environment tab) after the first deploy. ---
      - key: GROQ_API_KEY               # free at console.groq.com
        sync: false
      - key: LANGFUSE_PUBLIC_KEY        # free at cloud.langfuse.com
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_HOST
        value: https://cloud.langfuse.com
      # --- Security (set real random values before going live) ---
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      # --- Durable app DB (STRONGLY RECOMMENDED on the free plan) ---
      # Render's free filesystem is ephemeral: without this, all users,
      # connections, audit log, monitors, feedback and history are wiped on every
      # redeploy/spin-down. Point APP_DB_URL at a free managed Postgres
      # (Supabase or Neon — both have $0 tiers) so state persists. Paste the DSN
      # in the Render dashboard (Environment tab). See docs/DEPLOY.md.
      - key: APP_DB_URL                # postgresql://…  (Supabase/Neon free tier)
        sync: false
      # --- Production target DB (optional; default is the bundled SQLite demo) ---
      # - key: DEMO_TARGET_URL         # read-only Postgres DSN
      #   sync: false
      # --- Browser origins allowed to call this API ---
      # CORS_ORIGINS is the fixed list (comma-separated). CORS_ORIGIN_REGEX
      # additionally admits Vercel's per-branch/per-deploy preview URLs, which
      # all end in this account's unique suffix — without it, opening the app
      # on e.g. nexus-bi-git-main-….vercel.app fails every fetch.
      - key: CORS_ORIGINS
        value: https://nexus-bi-iota.vercel.app,http://localhost:3000
      - key: CORS_ORIGIN_REGEX
        value: ^https://(nexus-bi-iota\.vercel\.app|[a-z0-9-]+-krishnamathur008-1499s-projects\.vercel\.app)$
